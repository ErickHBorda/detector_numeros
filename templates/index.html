<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 Detector Múltiple de Dígitos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1929 0%, #1a2332 50%, #0d2137 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* Partículas de fondo animadas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(100, 180, 255, 0.4);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
            background: linear-gradient(45deg, #ffffff, #4fc3f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.8;
            color: #90caf9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(20, 30, 48, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(100, 180, 255, 0.2);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card h2 {
            margin-bottom: 20px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #64b5f6;
        }

        .video-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(100, 180, 255, 0.3);
        }

        #video {
            width: 100%;
            display: block;
            border-radius: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(30, 50, 80, 0.6);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(100, 180, 255, 0.2);
        }

        .stat-box:hover {
            transform: translateY(-5px);
            background: rgba(40, 60, 90, 0.7);
            border-color: rgba(100, 180, 255, 0.4);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #4fc3f7;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
            color: #90caf9;
        }

        .detections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .detection-card {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: popIn 0.5s ease-out;
            transition: transform 0.3s ease;
            border: 1px solid rgba(100, 180, 255, 0.3);
        }

        .detection-card:hover {
            transform: scale(1.05);
            border-color: rgba(100, 180, 255, 0.6);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .detection-number {
            font-size: 3em;
            font-weight: bold;
            color: #4fc3f7;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
        }

        .detection-confidence {
            font-size: 1.2em;
            margin-top: 10px;
            opacity: 0.95;
            color: #e3f2fd;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #0288d1, #4fc3f7);
            transition: width 0.5s ease;
        }

        .no-detection {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
            font-size: 1.2em;
            color: #90caf9;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 30, 48, 0.5);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 180, 255, 0.4);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 180, 255, 0.6);
        }
    </style>
</head>
<body>

    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <header>
            <h1>🔢 Detector Múltiple de Dígitos</h1>
            <p class="subtitle">Detección en tiempo real con Inteligencia Artificial</p>
        </header>

        <div class="main-content">
            <!-- Tarjeta de Video -->
            <div class="card">
                <h2>📹 Video en Vivo</h2>
                <div class="video-container">
                    <img id="video" src="/video_feed" alt="Video Stream">
                </div>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="totalNumbers">0</div>
                        <div class="stat-label">Números Detectados</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="avgConfidence">0%</div>
                        <div class="stat-label">Confianza Promedio</div>
                    </div>
                </div>
            </div>

            <!-- Tarjeta de Detecciones -->
            <div class="card">
                <h2>🎯 Detecciones Actuales</h2>
                <div id="detectionsContainer" class="detections-grid">
                    <div class="no-detection pulse">
                        Esperando detecciones...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Crear partículas de fondo
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Actualizar detecciones cada segundo
        function actualizarDetecciones() {
            fetch('/get_detections')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('detectionsContainer');
                    const totalNumbersEl = document.getElementById('totalNumbers');
                    const avgConfidenceEl = document.getElementById('avgConfidence');

                    totalNumbersEl.textContent = data.total_numbers;

                    if (data.detections && data.detections.length > 0) {
                        // Calcular confianza promedio
                        const avgConf = data.detections.reduce((sum, det) => sum + det.confidence, 0) / data.detections.length;
                        avgConfidenceEl.textContent = avgConf.toFixed(1) + '%';

                        // Generar tarjetas de detección
                        container.innerHTML = data.detections.map(det => `
                            <div class="detection-card">
                                <div class="detection-number">${det.number}</div>
                                <div class="detection-confidence">${det.confidence}%</div>
                                <div class="confidence-bar">
                                    <div class="confidence-fill" style="width: ${det.confidence}%"></div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        avgConfidenceEl.textContent = '0%';
                        container.innerHTML = '<div class="no-detection pulse">No se detectan números</div>';
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        setInterval(actualizarDetecciones, 1000);
    </script>
</body>
</html>
