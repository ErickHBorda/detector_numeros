<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔢 Detector de Dígitos Neural</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Fondo animado con partículas */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 136, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 255, 136, 0.1) 0%, transparent 50%);
            animation: backgroundShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes backgroundShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #00d4ff, #00ff88, #ff0088);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .subtitle {
            font-size: 1.2em;
            color: #888;
            letter-spacing: 2px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .video-container {
            position: relative;
            text-align: center;
        }

        #video {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            border: 3px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }

        #video.active {
            border-color: #00ff88;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
            }
            50% {
                box-shadow: 0 0 60px rgba(0, 255, 136, 0.6);
            }
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 10px;
            animation: blink 1.5s infinite;
        }

        .status-indicator.active {
            background: #00ff88;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            color: #0a0a1a;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.6);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ff0088, #ff4444);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 0, 136, 0.4);
        }

        .btn-stop:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 0, 136, 0.6);
        }

        .btn-reset {
            background: linear-gradient(135deg, #666, #444);
            color: white;
            box-shadow: 0 5px 20px rgba(100, 100, 100, 0.4);
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(100, 100, 100, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-panel {
            text-align: center;
        }

        .result-display {
            font-size: 5em;
            font-weight: bold;
            margin: 30px 0;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
            animation: numberGlow 2s ease-in-out infinite;
        }

        @keyframes numberGlow {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.3);
            }
        }

        .prediction-text {
            font-size: 2em;
            color: #00ff88;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .confidence-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0a0a1a;
        }

        .historial-panel {
            margin-top: 30px;
        }

        .historial-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #00d4ff;
        }

        .historial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
        }

        .historial-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .historial-item:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .historial-number {
            font-size: 2em;
            font-weight: bold;
            color: #00ff88;
        }

        .historial-confidence {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔢 Detector Neural de Dígitos</h1>
            <p class="subtitle">SISTEMA DE VISIÓN POR COMPUTADORA EN TIEMPO REAL</p>
        </header>

        <div class="main-content">
            <div class="panel video-container">
                <h2 style="margin-bottom: 20px; color: #00d4ff;">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="statusText">Sistema Detenido</span>
                </h2>
                <img id="video" src="" alt="Video Stream">
                <div class="controls">
                    <button class="btn btn-start" id="btnStart" onclick="startDetection()">
                        ▶ Iniciar
                    </button>
                    <button class="btn btn-stop" id="btnStop" onclick="stopDetection()" disabled>
                        ⏸ Detener
                    </button>
                    <button class="btn btn-reset" onclick="resetHistorial()">
                        🔄 Reiniciar
                    </button>
                </div>
            </div>

            <div class="panel result-panel">
                <h2 style="margin-bottom: 20px; color: #00ff88;">RESULTADO</h2>
                <div class="prediction-text" id="predictionText">Esperando...</div>
                <div class="result-display" id="resultDisplay">-</div>
                
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill" style="width: 0%;">
                        <span id="confidenceText">0%</span>
                    </div>
                </div>

                <div class="historial-panel">
                    <h3 class="historial-title">📊 Historial de Detecciones</h3>
                    <div class="historial-grid" id="historialGrid">
                        <p style="color: #666; grid-column: 1/-1;">Sin detecciones aún</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Desarrollado con TensorFlow & Flask | Modelo CNN entrenado con MNIST</p>
        </div>
    </div>

    <script>
        let isRunning = false;
        let updateInterval = null;

        function startDetection() {
            fetch('/api/start', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    isRunning = true;
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnStop').disabled = false;
                    document.getElementById('statusIndicator').classList.add('active');
                    document.getElementById('statusText').textContent = 'Sistema Activo';
                    document.getElementById('video').classList.add('active');
                    
                    // Activar stream de video
                    document.getElementById('video').src = '/video_feed';
                    
                    // Iniciar actualización de estado
                    updateInterval = setInterval(updateStatus, 1000);
                    
                    showNotification('✅ Detección iniciada', 'success');
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('❌ Error al iniciar', 'error');
                });
        }

        function stopDetection() {
            fetch('/api/stop', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    isRunning = false;
                    document.getElementById('btnStart').disabled = false;
                    document.getElementById('btnStop').disabled = true;
                    document.getElementById('statusIndicator').classList.remove('active');
                    document.getElementById('statusText').textContent = 'Sistema Detenido';
                    document.getElementById('video').classList.remove('active');
                    
                    // Detener stream de video
                    document.getElementById('video').src = '';
                    
                    // Detener actualización
                    if (updateInterval) {
                        clearInterval(updateInterval);
                    }
                    
                    showNotification('⏸ Detección detenida', 'info');
                })
                .catch(error => {
                    console.error('Error:', error);
                    showNotification('❌ Error al detener', 'error');
                });
        }

        function resetHistorial() {
            fetch('/api/reset', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('historialGrid').innerHTML = 
                        '<p style="color: #666; grid-column: 1/-1;">Sin detecciones aún</p>';
                    showNotification('🔄 Historial reiniciado', 'info');
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    if (data.activo) {
                        // Actualizar predicción
                        document.getElementById('predictionText').textContent = data.prediccion.toUpperCase();
                        document.getElementById('resultDisplay').textContent = data.numero;
                        
                        // Actualizar barra de confianza
                        const confidenceFill = document.getElementById('confidenceFill');
                        confidenceFill.style.width = data.confianza + '%';
                        document.getElementById('confidenceText').textContent = data.confianza + '%';
                        
                        // Actualizar historial
                        updateHistorial(data.historial);
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        function updateHistorial(historial) {
            const grid = document.getElementById('historialGrid');
            
            if (historial.length === 0) {
                grid.innerHTML = '<p style="color: #666; grid-column: 1/-1;">Sin detecciones aún</p>';
                return;
            }
            
            grid.innerHTML = '';
            
            // Mostrar en orden inverso (más reciente primero)
            historial.slice().reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'historial-item';
                div.innerHTML = `
                    <div class="historial-number">${item.numero}</div>
                    <div class="historial-confidence">${item.confianza}%</div>
                `;
                grid.appendChild(div);
            });
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? 'linear-gradient(135deg, #00ff88, #00d4ff)' : 
                            type === 'error' ? 'linear-gradient(135deg, #ff0088, #ff4444)' : 
                            'linear-gradient(135deg, #666, #444)'};
                color: ${type === 'info' ? 'white' : '#0a0a1a'};
                border-radius: 10px;
                font-weight: bold;
                box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
                z-index: 10000;
                animation: slideInRight 0.5s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOutRight 0.5s ease';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }

        // Agregar animaciones de notificación
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(400px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
