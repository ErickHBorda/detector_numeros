<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Dígitos</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            background-color: #1a1a2e; 
            color: white; 
            margin: 0; 
            padding: 20px;
        }
        h1 { color: #00d4ff; }
        #video { 
            width: 100%; 
            max-width: 500px; 
            border-radius: 10px; 
            border: 3px solid #00d4ff;
        }
        #result { 
            margin-top: 20px; 
            font-size: 32px; 
            font-weight: bold; 
            color: #00ff88;
        }
        .confidence { 
            font-size: 20px; 
            color: #cccccc; 
        }
    </style>
</head>
<body>

    <h1>🔢 Detector de Dígitos en Tiempo Real</h1>
    
    <img id="video" src="/video_feed" alt="Video Stream">
    
    <div id="result">Esperando...</div>

    <script>
        // Actualizar la predicción cada segundo
        function actualizarPrediccion() {
            fetch('/get_prediction')
                .then(response => response.json())
                .then(data => {
                    if (data.prediction) {
                        document.getElementById('result').innerHTML = 
                            `Predicción: ${data.prediction.toUpperCase()} <br>
                             <span class="confidence">Confianza: ${data.confidence}%</span>`;
                    }
                })
                .catch(error => console.error('Error:', error));
        }
        
        setInterval(actualizarPrediccion, 1000);
    </script>
</body>
</html>
